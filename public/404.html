<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages SPA fallback:
      // Redirect unknown routes to /index.html while preserving the path in ?p=
      (function () {
        var l = window.location;
        var base = l.pathname.split('/').slice(0, 2).join('/'); // "/ManyRoll"
        var path = l.pathname.slice(base.length);
        var target = base + '/?p=' + encodeURIComponent(path + l.search + l.hash);
        l.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
